compilation_database_dir: build
output_directory: docs/diagrams
generate_method_arguments: none
generate_packages: true
package_type: namespace
allow_empty_diagrams: true

diagrams:
  all_classes:
    type: class
    glob:
      - "src/*.cpp"
      - "examples/*.cpp"
    include:
      namespaces:
        - "ootest::core"
        - "ootest::render"
        - "ootest::resource"
        - "ootest::system"
        - "ootest::event"
    generate_packages: true

  event_sequence:
    type: sequence
    glob:
      - "src/main.cpp"

    from:
      - function:
          r: ".*Dispatcher::dispatch\\(.*\\).*"
          # r: ".*main.*"
    to:
      - function:
          r: ".*"
    inline_lambda_messages: true
    fold_repeated_activities: true
    generate_return_types: false

  packages:
    type: package
    glob:
      - "src/*.cpp"
      - "examples/*.cpp"
    generate_packages: true

  all_includes:
    type: include
    glob:
      - "src/*.cpp"
      - "examples/*.cpp"

  focused_example:
    type: class
    generate_packages: true
    include:
      elements: []